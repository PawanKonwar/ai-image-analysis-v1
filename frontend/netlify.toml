# Netlify config for AI Image Analysis POC
# Build settings (adjust if your Netlify site uses different paths)
[build]
  command = "npm run build"
  publish = "dist"

# Proxy API requests to backend - fixes mixed content (HTTPS page calling HTTP API)
# Requests to /api/* are forwarded to your backend; browser sees same-origin requests
[[redirects]]
  from = "/api/*"
  to = "http://18.215.16.4:3000/api/:splat"
  status = 200
  force = true
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200